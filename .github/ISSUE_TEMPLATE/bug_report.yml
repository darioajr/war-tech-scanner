name: "🐛 Bug Report"
description: Reporte um comportamento incorreto ou inesperado
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Preencha os campos abaixo para agilizar a correção.

  - type: input
    id: version
    attributes:
      label: Versão do war-tech-scanner
      placeholder: "ex: 0.1.0"
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Versão do Java
      placeholder: "ex: OpenJDK 21.0.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Sistema operacional
      placeholder: "ex: macOS 14.5 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: artifact_type
    attributes:
      label: Tipo do artefato analisado
      placeholder: "ex: EAR, WAR, JAR"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Comando executado
      render: bash
      placeholder: |
        java -jar war-tech-scanner-0.1.0.jar minha-app.ear --target-eap=8.1 --json
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento observado
      description: Cole a saída completa (incluindo erros)
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Qualquer informação extra que possa ajudar (stack trace, logs, etc.)
